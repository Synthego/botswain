version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: botswain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - botswain-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - botswain-network

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - .:/app
    ports:
      - "8002:8002"
    environment:
      - DJANGO_SETTINGS_MODULE=botswain.settings.local
      - POSTGRES_DB=botswain
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
    networks:
      - botswain-network
      - synthego-local

volumes:
  postgres_data:

networks:
  botswain-network:
    driver: bridge
  synthego-local:
    external: true
